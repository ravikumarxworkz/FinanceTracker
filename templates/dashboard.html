{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack | Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --income: #10b981;
            --expense: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: var(--dark);
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #logo h1::before {
            content: "•";
            font-size: 1.8rem;
            color: var(--primary);
        }

        .nav-button {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            background-color: transparent;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .btn.active {
            background-color: var(--primary);
            color: white;
        }

        .nav-logo {
            display: flex;
            gap: 1rem;
        }

        .nav-logo button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-logo button:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Main Container */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Chart Containers */
        .chart-container {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .chart-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .chart-container h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--dark);
        }

        canvas {
            width: 100% !important;
            height: auto !important;
        }

        /* Quick Actions */
        .feilds {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .feilds button {
            padding: 0.8rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .feilds button.income {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .feilds button.income:hover {
            background-color: var(--primary);
            color: white;
        }

        .feilds button.expense {
            background-color: #fee2e2;
            color: var(--expense);
        }

        .feilds button.expense:hover {
            background-color: var(--expense);
            color: white;
        }

        .balance {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: var(--border-radius);
            background-color: var(--light);
        }

        .positive {
            color: var(--income);
        }

        .negative {
            color: var(--expense);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .nav-button {
                width: 100%;
                justify-content: space-between;
            }
            
            .btn {
                flex: 1;
                justify-content: center;
            }
            
            .container {
                padding: 1rem;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <nav class="nav">                
        <a href="/dashboard" id="logo"><h1>FinTrack</h1></a>
        <div class="nav-button">
            <button class="btn" id="Dashboard" onclick="location.href='/dashboard'">Dashboard</button>
            <button class="btn" id="Income" onclick="location.href='/incomes'">Incomes</button>
            <button class="btn" id="Expense" onclick="location.href='/expenses'">Expenses</button>
            <button class="btn" id="Setting" onclick="location.href='/settings'">Settings</button>
        </div>

        <div class="nav-logo">
            <button class="btn" id="Profile" onclick="location.href='/profile'">
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Profile" width="24" height="24">
            </button>
            <button class="btn" id="Logout" onclick="location.href='/logout'">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828490.png" alt="Logout" width="24" height="24">
            </button>
        </div>
        
    </nav>

    <main class="container">
        <div class="left-chart">
            <div class="chart-container">
                <h3>Recent Income Trends</h3>
                <canvas id="chart1"></canvas>
            </div>
            <div class="chart-container">
                <h3>Recent Expense Trends</h3>
                <canvas id="chart2"></canvas>
            </div>
        </div>
        <div class="right-chart">
            <div class="chart-container">
                <h3>Expense Categories</h3>
                <canvas id="chart3"></canvas>
            </div>

            <div class="feilds">
                <button class="income" onclick="location.href='/incomes'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 8V16M8 12H16M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Add Income
                </button>
                <button class="expense" onclick="location.href='/expenses'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 8V16M8 12H16M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Add Expense
                </button>

                <p class="balance {% if balance >= 0 %}positive{% else %}negative{% endif %}">
                    Current Balance: {{balance}} ₹
                </p>
            </div>
        </div>
    </main>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
    <script>
        // Set active nav button
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/')[1] || 'dashboard';
            document.getElementById(currentPage.charAt(0).toUpperCase() + currentPage.slice(1)).classList.add('active');
        });

        // Chart 1 - Income Trends
        const ctx1 = document.getElementById("chart1").getContext("2d");
        new Chart(ctx1, {
            type: "bar",
            data: {
                labels: [{% for day in pre_10days_list %}"{{day}}",{% endfor %}],
                datasets: [{
                    label: "Income (₹)",
                    data: [{% for income in Income_last_10days_amount %}{{ income }},{% endfor %}],
                    backgroundColor: "rgba(16, 185, 129, 0.2)",
                    borderColor: "rgba(16, 185, 129, 1)",
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: "rgba(0, 0, 0, 0.05)"
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        // Chart 2 - Expense Trends
        const ctx2 = document.getElementById("chart2").getContext("2d");
        new Chart(ctx2, {
            type: "line",
            data: {
                labels: [{% for day in pre_10days_list %}"{{day}}",{% endfor %}],
                datasets: [{
                    label: "Expenses (₹)",
                    data: [{% for expense in Expense_last_10days_amount %}{{ expense }},{% endfor %}],
                    borderColor: "rgba(239, 68, 68, 1)",
                    backgroundColor: "rgba(239, 68, 68, 0.1)",
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: "rgba(0, 0, 0, 0.05)"
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        // Chart 3 - Expense Categories
        const ctx3 = document.getElementById("chart3").getContext("2d");
        new Chart(ctx3, {
            type: "doughnut",
            data: {
                labels: [{% for category in category_list %}"{{category}}",{% endfor %}],
                datasets: [{
                    data: [{% for val in catg_total_list %}{{val}},{% endfor %}],
                    backgroundColor: [
                        "#EF4444", "#F59E0B", "#10B981", "#3B82F6", 
                        "#6366F1", "#8B5CF6", "#EC4899", "#6B7280",
                        "#F97316", "#14B8A6", "#0EA5E9", "#A855F7"
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                cutout: '70%',
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            boxWidth: 12,
                            padding: 16
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
