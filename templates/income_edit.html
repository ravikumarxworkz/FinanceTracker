{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack | Edit Income</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --income: #10b981;
            --expense: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: var(--dark);
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #logo h1::before {
            content: "•";
            font-size: 1.8rem;
            color: var(--primary);
        }

        .nav-button {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            background-color: transparent;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .btn.active {
            background-color: var(--primary);
            color: white;
        }

        .nav-logo {
            display: flex;
            gap: 1rem;
        }

        .nav-logo button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-logo button:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Edit Form Container */
        .edit-container {
            max-width: 600px;
            margin: 2rem auto;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 2rem;
        }

        .edit-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--dark);
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .nav-button {
                width: 100%;
                justify-content: space-between;
            }
            
            .btn {
                flex: 1;
                justify-content: center;
            }
            
            .edit-container {
                margin: 1rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">                
        <a href="/dashboard" id="logo"><h1>FinTrack</h1></a>
        <div class="nav-button">
            <button class="btn" id="Dashboard" onclick="location.href='/dashboard'">Dashboard</button>
            <button class="btn active" id="Income" onclick="location.href='/incomes'">Incomes</button>
            <button class="btn" id="Expense" onclick="location.href='/expenses'">Expenses</button>
            <button class="btn" id="Setting" onclick="location.href='/settings'">Settings</button>
        </div>

        <div class="nav-logo">
            <button class="btn" id="Profile" onclick="location.href='/profile'">
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Profile" width="24" height="24">
            </button>
            <button class="btn" id="Logout" onclick="location.href='/logout'">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828490.png" alt="Logout" width="24" height="24">
            </button>
        </div>
    </nav>

    <div class="edit-container">
        <h2>Update Income Details</h2>
        <form id="incomeDetailsForm" action="/edit-income/{{income.id}}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{income.name}}" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for category in categories %}
                    {% if category == income.category %}
                    <option value="{{category.id}}" selected>{{category.name}}</option>
                    {% else %}
                    <option value="{{category.id}}">{{category.name}}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" name="amount" value="{{income.amount}}" required>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{income.date}}" required>
            </div>

            <div class="form-group">
                <label for="note">Note</label>
                <textarea id="note" name="note" rows="4">{{income.note}}</textarea>
            </div>
            
            <input type="submit" value="Update Income" class="submit-btn">
        </form>
    </div>

    <script>
        // Set active nav button
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/')[1] || 'dashboard';
            document.getElementById(currentPage.charAt(0).toUpperCase() + currentPage.slice(1)).classList.add('active');
        });
    </script>
</body>
</html>
