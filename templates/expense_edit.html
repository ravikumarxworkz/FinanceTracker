{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense | FinTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: var(--dark);
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #logo h1::before {
            content: "•";
            font-size: 1.8rem;
            color: var(--primary);
        }

        .nav-button {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            background-color: transparent;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .btn.active {
            background-color: var(--primary);
            color: white;
        }

        .nav-logo {
            display: flex;
            gap: 1rem;
        }

        .nav-logo button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-logo button:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Expense Edit Form Container */
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .form-title {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--dark);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .expense-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            align-self: center;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .nav-button {
                width: 100%;
                justify-content: space-between;
            }
            
            .btn {
                flex: 1;
                justify-content: center;
            }
            
            .container {
                padding: 1rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Modern Navbar -->
    <nav class="nav">                
        <a href="/dashboard" id="logo"><h1>FinTrack</h1></a>
        <div class="nav-button">
            <button class="btn" id="Dashboard" onclick="location.href='/dashboard'">Dashboard</button>
            <button class="btn" id="Income" onclick="location.href='/incomes'">Incomes</button>
            <button class="btn active" id="Expense" onclick="location.href='/expenses'">Expenses</button>
            <button class="btn" id="Setting" onclick="location.href='/settings'">Settings</button>
        </div>

        <div class="nav-logo">
            <button class="btn" id="Profile" onclick="location.href='/profile'">
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Profile" width="24" height="24">
            </button>
            <button class="btn" id="Logout" onclick="location.href='/logout'">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828490.png" alt="Logout" width="24" height="24">
            </button>
        </div>
    </nav>

    <!-- Expense Edit Container -->
    <div class="container">
        <h2 class="form-title">Update Expense Details</h2>
        <form class="expense-form" action="/edit-expense/{{expense.id}}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{expense.name}}" required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for category in categories %}
                    {% if category == expense.category %}
                    <option value="{{category.id}}" selected>{{category.name}}</option>
                    {% else %}
                    <option value="{{category.id}}">{{category.name}}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" name="amount" value="{{expense.amount}}" required>
            </div>
            
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{expense.date}}">
            </div>
            
            <div class="form-group">
                <label for="note">Note</label>
                <textarea id="note" name="note" rows="4">{{expense.note}}</textarea>
            </div>
            
            <button type="submit" class="submit-btn">Update Expense</button>
        </form>
    </div>

    <script>
        // Set active nav button
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/')[1] || 'dashboard';
            document.getElementById(currentPage.charAt(0).toUpperCase() + currentPage.slice(1)).classList.add('active');
        });
    </script>
</body>
</html>
