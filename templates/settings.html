{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack | Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --income: #10b981;
            --expense: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #9ca3af;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: var(--dark);
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #logo h1::before {
            content: "•";
            font-size: 1.8rem;
            color: var(--primary);
        }

        .nav-button {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            background-color: transparent;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .btn.active {
            background-color: var(--primary);
            color: white;
        }

        .nav-logo {
            display: flex;
            gap: 1rem;
        }

        .nav-logo button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-logo button:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Main Container */
        .main-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--dark);
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .add-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .add-button:hover {
            background-color: var(--primary-dark);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--light);
            text-align: left;
        }

        table .btn {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--expense);
            padding: 0.5rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        table .btn:hover {
            background-color: var(--expense);
            color: white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">                
        <a href="/dashboard" id="logo"><h1>FinTrack</h1></a>
        <div class="nav-button">
            <button class="btn" id="Dashboard" onclick="location.href='/dashboard'">Dashboard</button>
            <button class="btn" id="Income" onclick="location.href='/incomes'">Incomes</button>
            <button class="btn" id="Expense" onclick="location.href='/expenses'">Expenses</button>
            <button class="btn active" id="Setting" onclick="location.href='/settings'">Settings</button>
        </div>

        <div class="nav-logo">
            <button class="btn" id="Profile" onclick="location.href='/profile'">
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Profile" width="24" height="24">
            </button>
            <button class="btn" id="Logout" onclick="location.href='/logout'">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828490.png" alt="Logout" width="24" height="24">
            </button>
        </div>
        
        
    </nav>

    <div class="main-container">
        <div class="container">
            <form method="post" action="/add-income-category">
                {% csrf_token %}
                <h2>Income Categories</h2>
                <input type="text" id="income" name="name" class="input-field" placeholder="Enter Income Category">
                <input type="submit" value="Add Category" class="add-button">
            </form>
            <table>
                {% for category in income_categories %}
                    <tr>
                        <td>{{category}}</td>
                        <td>
                            <button class="btn" onclick="location.href='/remove-income-category/{{category.id}}'">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 7V18C6 19.1046 6.89543 20 8 20H16C17.1046 20 18 19.1046 18 18V7M6 7H5M6 7H9M18 7H19M18 7H15M9 7V6C9 4.89543 9.89543 4 11 4H13C14.1046 4 15 4.89543 15 6V7M9 7H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </td>
                    </tr>
                {% endfor %}
            </table>
        </div>

        <div class="container">
            <form method="post" action="/add-expense-category">
                {% csrf_token %}
                <h2>Expense Categories</h2>
                <input type="text" id="expense" name="name" class="input-field" placeholder="Enter Expense Category">
                <input type="submit" value="Add Category" class="add-button">
            </form>
            <table>
                {% for category in expense_categories %}
                    <tr>
                        <td>{{category}}</td>
                        <td>
                            <button class="btn" onclick="location.href='/remove-expense-category/{{category.id}}'">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 7V18C6 19.1046 6.89543 20 8 20H16C17.1046 20 18 19.1046 18 18V7M6 7H5M6 7H9M18 7H19M18 7H15M9 7V6C9 4.89543 9.89543 4 11 4H13C14.1046 4 15 4.89543 15 6V7M9 7H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </td>
                    </tr>
                {% endfor %}
            </table>
        </div>
    </div>

    <script>
        // Set active nav button
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/')[1] || 'dashboard';
            document.getElementById(currentPage.charAt(0).toUpperCase() + currentPage.slice(1)).classList.add('active');
        });
    </script>
</body>
</html>
